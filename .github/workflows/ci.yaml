name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '26'

jobs:
  # Build and Test
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/gui/package-lock.json

      - name: Build GUI
        run: |
          npm install --prefix web/gui
          NODE_ENV=production npm run --prefix web/gui build

      - name: Build
        run: go build -o proxy-speedtest

      - name: Test
        run: |
          go test -v ./...
          ls -la proxy-speedtest

  # Multi-platform Release
  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/gui/package-lock.json

      - name: Build GUI
        run: |
          npm install --prefix web/gui
          NODE_ENV=production npm run --prefix web/gui build

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          BUILDTIME=$(date -u)
          go build -trimpath -ldflags "-X 'github.com/1orz/proxy-speedtest/constant.Version=${VERSION}' \
            -X 'github.com/1orz/proxy-speedtest/constant.BuildTime=${BUILDTIME}' \
            -w -s" \
            -o proxy-speedtest${{ matrix.suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: proxy-speedtest-${{ matrix.goos }}-${{ matrix.goarch }}
          path: proxy-speedtest${{ matrix.suffix }}

  # Publish Release
  publish:
    name: Publish Release
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create release archives
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          mkdir -p release
          
          # Unix platforms (tar.gz)
          for platform in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            if [ -d "artifacts/proxy-speedtest-${platform}" ]; then
              chmod +x artifacts/proxy-speedtest-${platform}/proxy-speedtest
              tar -czvf release/proxy-speedtest-${platform}-${VERSION}.tar.gz \
                -C artifacts/proxy-speedtest-${platform} proxy-speedtest
            fi
          done
          
          # Windows (zip)
          if [ -d "artifacts/proxy-speedtest-windows-amd64" ]; then
            cd artifacts/proxy-speedtest-windows-amd64
            zip -9 ../../release/proxy-speedtest-windows-amd64-${VERSION}.zip proxy-speedtest.exe
            cd ../..
          fi
          
          ls -la release/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Docker Build and Push
  docker:
    name: Docker
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version and build time
        id: get_version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKER_USERNAME }}/proxyspeedtest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.get_version.outputs.VERSION }}
            BUILD_TIME=${{ steps.get_version.outputs.BUILD_TIME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

