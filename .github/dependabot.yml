# Dependabot 配置:自动检查并升级依赖
# 文档:https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # ---------- Go 模块(根目录)----------
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "go"
    groups:
      # 将 minor/patch 升级合并为单个 PR,减少噪声
      go-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------- 前端(web/gui,npm)----------
  - package-ecosystem: "npm"
    directory: "/web/gui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "javascript"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------- GitHub Actions 工作流 ----------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-all:
        update-types:
          - "minor"
          - "patch"
